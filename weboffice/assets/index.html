<!DOCTYPE html>
<!-- SPDX-License-Identifier: MIT -->
<html style="height:100%">
  <head>
    <meta charset="utf-8">
    <script type="text/javascript">
      // Relative URLs break if the main URL's last directory has no slash.
      // Some web servers don't add that / as "Apache DirectorySlash" does.
      if (!location.pathname.endsWith('/') && !location.pathname.endsWith('.html')) {
        location.replace(location.pathname + '/' + location.search + location.hash);
      }
    </script>
    <title>Web Office</title>
    <script src="brotli.js"></script>
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
      .spinner {
        border: 16px solid #3b73ab;
        border-top: 16px solid #26b99a;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        position: relative;
        left: 100px;  /* adjust to center */
        animation: spin 2s linear 30; /* 60 seconds */
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .canvas-wrapper {
        position: relative;
      }

      /* position: Makes the loading animation overlay the canvas.
      /    Needs a surrounding table with fixed width to work properly.
      /  onselectstart: Prevents accidently selecting / highlighting the canvas.
      /    Must be set on the surrounding HTML element. (tested in Firefox-128) */
      .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      
      #status {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 6px 14px;
        border-radius: 4px;
        display: none;
        z-index: 1000;
        pointer-events: none;
      }

      #btnSaveAs {
        position: fixed;
        top: 6px;
        right: 8px;
        z-index: 1000;
        display: none;
      }
    </style>
  </head>
  <body style="height:100%">

    <div id="status"></div>
    <button class="btn btn-sm btn-light" id="btnSaveAs" onclick="btnSaveAsFunc()">Save As</button>
    <div class="container-fluid" style="height:100%; padding-right:0;">
      <div class="row" style="width: 100%; height: 100%;">
        <div class="col" style="padding-right:0;">
          <div class="canvas-wrapper" onselectstart="event.preventDefault()">
            <div id="loadingInfo" class="loading-overlay">
              <div class="spinner"></div><br>
            </div>
            <canvas
              id="qtcanvas" contenteditable="true" class="qt-canvas"
              oncontextmenu="event.preventDefault()" onkeydown="event.preventDefault()"
              style="border: 0px none; padding: 0; outline: 1px solid #cccccc; width:100%; height:100vh; visibility:hidden;">
              <!-- Qt requires the canvas to have the ID "qtcanvas". -->
              <!-- The canvas *must not* have any border or padding, or mouse coords will be wrong. -->
              <!-- An outline is fine though. -->
            </canvas>
          </div>
        </div>
      </div>

    </div>
    <script type="text/javascript">
      'use strict';

      	// Set base URL to the soffice.* files.
      	// Use an empty string if those files are in the same directory.
      	let soffice_base_url = '';

      	const canvas = document.getElementById('qtcanvas');
      	const loadingInfo = document.getElementById('loadingInfo');
      	const btnSaveAs = document.getElementById('btnSaveAs');


      	var Module = {
        	canvas,
        	uno_scripts: ['./assets/vendor/zetajs/zeta.js', './office_thread.js'],
        	locateFile: function(path, prefix) { return (prefix || soffice_base_url) + path; },
      	};
      	if (soffice_base_url !== '') {
        	// Must not be set when soffice.js is in the same directory.
        	Module.mainScriptUrlOrBlob = new Blob(
          	["importScripts('"+soffice_base_url+"soffice.js');"], {type: 'text/javascript'});
      	}

      	let thrPort;     // zetajs thread communication
      	let lastDevicePixelRatio = window.devicePixelRatio;

		let href = window.location.href
		let url = new URL(href);
		let filePath = url.searchParams.get("path");
		let filename = filePath.substring(filePath.lastIndexOf('/') + 1);
		let isPathWritable = url.searchParams.get("isPathWritable") == 'true';
		
		setStatus("Initialising Web Office...", false);

      	async function loadFile() {
      		setStatus("Loading file: " + filename, false);
			let response = await fetch(filePath, { method: 'GET' });
      		if (response.status === 200) {
				let arrayBuffer = await response.arrayBuffer();
				try { FS.mkdir('/tmp/office/'); } catch {}
            	await FS.writeFile('/tmp/office/' + filename, new Uint8Array(arrayBuffer));
           		await thrPort.postMessage({ cmd: 'upload', filename });
	      		setStatus("File loaded", true);
      		} else {
      			console.log('error loading file:' + response.status);
      			setStatus("Unable to load file", false);
      		} 
        	loadingInfo.style.display = null;
      	}
      
      	function setStatus(msg, isTemporary) {
			const output = document.getElementById('status');
        	output.innerText = msg;
        	output.style.display = msg ? 'block' : 'none';
        	if (isTemporary) {
				setTimeout(() => {
    	    		output.style.display = 'none';
				}, 3000);
			}
      	}

      	function btnSaveAsFunc() {
      		thrPort.postMessage({ cmd: 'triggerSaveAs' });
      	}

      	// Intercept Ctrl+S / Cmd+S in window capture phase — fires before any Qt handler
      	// regardless of which element has focus. Prevents LibreOffice from dispatching
      	// .uno:Save which shows a file dialog that crashes in WASM.
      	window.addEventListener('keydown', function(e) {
      		if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      			e.stopImmediatePropagation();
      			e.preventDefault();
      			console.log('weboffice: Ctrl+S intercepted, shiftKey=' + e.shiftKey);
      			if (thrPort) thrPort.postMessage({ cmd: e.shiftKey ? 'triggerSaveAs' : 'triggerSave' });
      		}
      	}, { capture: true });

      	function saveFile(bytes) {
      		setStatus("Saving file...", false);
        	fetch(filePath, { method: 'PUT', headers: {}, body: bytes }).then(function(response) {
    			if (response.status === 200) {
                	setStatus("File saved", true);
				} else {
			    	console.log('error saving file:' + response.status);
			    	setStatus("Unable to save file...", false);
				}
    		});
      	}

      	function saveFileAs(bytes, saveFilename) {
      		setStatus("Saving file...", false);
        	fetch('/peergos-api/v0/save/' + (saveFilename || filename), { method: 'PUT', body: bytes }).then(function(response) {
    			if (response.status === 200 || response.status === 201) {
                	setStatus("File saved", true);
				} else {
			    	console.log('error saving file as:' + response.status);
			    	setStatus("Unable to save file...", false);
				}
    		});
      	}

      	// Save a new file (e.g. PDF export) directly alongside the source file in Peergos.
      	async function pickImageFile() {
      		setStatus('Opening file picker...', false);
      		try {
      			const ext = 'jpg,jpeg,png,gif,webp,svg,avif,bmp';
      			const response = await fetch(
      				'/peergos-api/v0/file-picker/?extension=' + ext,
      				{ method: 'GET' }
      			);
      			if (response.status !== 200) { setStatus('', false); return; }
      			const files = JSON.parse(await response.text());
      			if (!files || !files.length || !files[0]) { setStatus('', false); return; }
      			const selectedPath = files[0];
      			const imgExt = (selectedPath.match(/\.([^.]+)$/) || ['', 'png'])[1].toLowerCase();
      			setStatus('Loading image...', false);
      			const imgResponse = await fetch(selectedPath, { method: 'GET' });
      			if (imgResponse.status !== 200) {
      				setStatus('Failed to load image', false); return;
      			}
      			const bytes = new Uint8Array(await imgResponse.arrayBuffer());
      			const tmpPath = '/tmp/insert_image.' + imgExt;
      			FS.writeFile(tmpPath, bytes);
      			setStatus('Inserting image...', false);
      			thrPort.postMessage({ cmd: 'insertGraphic', tmpPath });
      		} catch(e) {
      			console.error('pickImageFile failed:', e);
      			setStatus('', false);
      		}
      	}

      	function saveNewFile(bytes, saveFilename) {
      		const dir = filePath.substring(0, filePath.lastIndexOf('/') + 1);
      		const targetPath = dir + saveFilename;
      		setStatus("Saving " + saveFilename + "...", false);
        	fetch(targetPath, { method: 'PUT', body: bytes }).then(function(response) {
    			if (response.status === 200 || response.status === 201) {
                	setStatus(saveFilename + " saved", true);
				} else {
			    	console.log('error saving new file:' + response.status);
			    	setStatus("Unable to save " + saveFilename, false);
				}
    		});
      	}

      // Scroll only the canvas while the mouse cursor is above it.
      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
      }, {passive: false});

      window.onresize = function() {
        // Workaround to inform Qt5 about changed browser zoom.
        setTimeout(function() {
          try {
            if (lastDevicePixelRatio) {
              if (lastDevicePixelRatio != window.devicePixelRatio) {
                lastDevicePixelRatio = false;
                window.dispatchEvent(new Event('resize'));
              }
            } else {
              lastDevicePixelRatio = window.devicePixelRatio
              window.dispatchEvent(new Event('resize'));
            }
          } catch(e) { console.warn('resize proxy error:', e); }
        }, 100);
      };


      const soffice_js = document.createElement("script");
      soffice_js.src = soffice_base_url + "soffice.js";
      // "onload" runs after the loaded script has run.
      soffice_js.onload = function() {
        console.log('PLUS: Configuring Module');
        Module.uno_main.then(function(pThrPort) {
          thrPort = pThrPort;
          thrPort.onmessage = function(e) {
            switch (e.data.cmd) {
            case 'thr_running':
              loadingInfo.style.display = 'none';
              setTimeout(() => loadFile(), 10);
              break;
            case 'ui_ready':  // user uploaded a file
              // Trigger resize of the embedded window to match the canvas size.
              // May somewhen be obsoleted by:
              //   https://gerrit.libreoffice.org/c/core/+/174040
              try { window.dispatchEvent(new Event('resize')); } catch(e) { console.warn('resize proxy error:', e); }
              setTimeout(function() {  // display Office UI properly
                loadingInfo.style.display = 'none';
                canvas.style.visibility = null;
                setStatus('', false);
                btnSaveAs.style.display = '';
              }, 1000);
              break;
            case 'saved':
              const saveFilename = e.data.filename || filename;
              const readPath = e.data.tmpFile ? '/tmp/' + e.data.tmpFile : '/tmp/office/' + saveFilename;
              const bytes = FS.readFile(readPath);
              if (e.data.isAs || !isPathWritable) {
                saveFileAs(bytes, saveFilename);
              } else {
                saveFile(bytes);
              }
              break;
            case 'pickImage':
              pickImageFile();
              break;
            case 'imageInserted':
              setStatus('Image inserted', true);
              break;
            case 'error':
              loadingInfo.style.display = 'none';
              setStatus('Error: ' + e.data.message, false);
              break;
            default:
              throw Error('Unknown message command: ' + e.data.cmd);
            }
          };
        });
      };
      // Check if WebGL is available on OffscreenCanvas before loading the heavy WASM.
      // LibreOffice WASM renders via Qt into an OffscreenCanvas WebGL context in a Worker.
      // If WebGL is unavailable (no GPU, hardware acceleration disabled), it fails silently.
      function checkOffscreenWebGL() {
        if (typeof OffscreenCanvas === 'undefined') return false;
        try {
          var oc = new OffscreenCanvas(1, 1);
          return !!(oc.getContext('webgl') || oc.getContext('webgl2'));
        } catch(e) { return false; }
      }

      if (!checkOffscreenWebGL()) {
        loadingInfo.style.display = 'none';
        setStatus('WebGL is not available. Web Office requires hardware-accelerated WebGL. ' +
          'Please enable hardware acceleration in your browser settings.', false);
      } else {
        console.log('Loading WASM binaries for ZetaJS from: ' + soffice_base_url);
        // Hint: The global objects "canvas" and "Module" must exist before the next line.
        document.body.appendChild(soffice_js);
      }
    </script>
  </body>
</html>
