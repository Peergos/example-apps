<!DOCTYPE html>
<!-- SPDX-License-Identifier: MIT -->
<html style="height:100%">
  <head>
    <meta charset="utf-8">
    <script type="text/javascript">
      // Relative URLs break if the main URL's last directory has no slash.
      // Some web servers don't add that / as "Apache DirectorySlash" does.
      if (!location.pathname.endsWith('/') && !location.pathname.endsWith('.html')) {
        location.replace(location.pathname + '/' + location.search + location.hash);
      }
    </script>
    <title>Web Office</title>
    <!-- Preload the large WASM and data files as early as possible so the browser
         starts fetching them while the rest of the page is still being parsed. -->
    <link rel="preload" href="soffice.wasm" as="fetch" crossorigin>
    <link rel="preload" href="soffice.data" as="fetch" crossorigin>
    <script src="brotli.js"></script>
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
      .spinner {
        border: 16px solid #3b73ab;
        border-top: 16px solid #26b99a;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        position: relative;
        left: 100px;  /* adjust to center */
        animation: spin 2s linear 30; /* 60 seconds */
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .canvas-wrapper {
        position: relative;
      }

      /* position: Makes the loading animation overlay the canvas.
      /    Needs a surrounding table with fixed width to work properly.
      /  onselectstart: Prevents accidently selecting / highlighting the canvas.
      /    Must be set on the surrounding HTML element. (tested in Firefox-128) */
      .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      
      #status {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 6px 14px;
        border-radius: 4px;
        display: none;
        z-index: 1000;
        pointer-events: none;
      }

      #btnSaveAs {
        position: fixed;
        top: 6px;
        right: 8px;
        z-index: 1000;
        display: none;
      }

    </style>
  </head>
  <body style="height:100%">

    <div id="status"></div>
    <button class="btn btn-sm btn-light" id="btnSaveAs" onclick="btnSaveAsFunc()">Save As</button>

    <div class="container-fluid" style="height:100%; padding-right:0;">
      <div class="row" style="width: 100%; height: 100%;">
        <div class="col" style="padding-right:0;">
          <div class="canvas-wrapper" onselectstart="event.preventDefault()">
            <div id="loadingInfo" class="loading-overlay">
              <div class="spinner"></div><br>
            </div>
            <canvas
              id="qtcanvas" contenteditable="true" class="qt-canvas"
              oncontextmenu="event.preventDefault()" onkeydown="event.preventDefault()"
              style="border: 0px none; padding: 0; outline: 1px solid #cccccc; width:100%; height:100vh; visibility:hidden;">
              <!-- Qt requires the canvas to have the ID "qtcanvas". -->
              <!-- The canvas *must not* have any border or padding, or mouse coords will be wrong. -->
              <!-- An outline is fine though. -->
            </canvas>
          </div>
        </div>
      </div>

    </div>
    <script type="text/javascript">
      'use strict';

      	// Set base URL to the soffice.* files.
      	// Use an empty string if those files are in the same directory.
      	let soffice_base_url = '';

      	const canvas = document.getElementById('qtcanvas');
      	const loadingInfo = document.getElementById('loadingInfo');
      	const btnSaveAs = document.getElementById('btnSaveAs');


      	var Module = {
        	canvas,
        	uno_scripts: ['./assets/vendor/zetajs/zeta.js', './office_thread.js'],
        	locateFile: function(path, prefix) { return (prefix || soffice_base_url) + path; },
      	};
      	if (soffice_base_url !== '') {
        	// Must not be set when soffice.js is in the same directory.
        	Module.mainScriptUrlOrBlob = new Blob(
          	["importScripts('"+soffice_base_url+"soffice.js');"], {type: 'text/javascript'});
      	}

      	let thrPort;     // zetajs thread communication
      	let lastDevicePixelRatio = window.devicePixelRatio;

		let href = window.location.href
		let url = new URL(href);
		let filePath = url.searchParams.get("path");
        let filename = filePath ? filePath.substring(filePath.lastIndexOf("/") + 1) : "";
		let isPathWritable = url.searchParams.get("isPathWritable") == 'true';
		
		setStatus("Initialising Web Office...", false);

      	async function loadFile() {
      		setStatus("Loading file: " + filename, false);
			let response = await fetch(filePath, { method: 'GET' });
      		if (response.status === 200) {
				let arrayBuffer = await response.arrayBuffer();
				try { FS.mkdir('/tmp/office/'); } catch {}
            	await FS.writeFile('/tmp/office/' + filename, new Uint8Array(arrayBuffer));
           		await thrPort.postMessage({ cmd: 'upload', filename });
	      		setStatus("File loaded", true);
      		} else {
      			console.log('error loading file:' + response.status);
      			setStatus("Unable to load file", false);
      		} 
        	loadingInfo.style.display = null;
      	}
      
      	function setStatus(msg, isTemporary) {
			const output = document.getElementById('status');
        	output.innerText = msg;
        	output.style.display = msg ? 'block' : 'none';
        	if (isTemporary) {
				setTimeout(() => {
    	    		output.style.display = 'none';
				}, 3000);
			}
      	}

      	function btnSaveAsFunc() {
      		thrPort.postMessage({ cmd: 'triggerSaveAs' });
      	}

      	// Intercept Ctrl+S / Cmd+S in window capture phase — fires before any Qt handler
      	// regardless of which element has focus. Prevents LibreOffice from dispatching
      	// .uno:Save which shows a file dialog that crashes in WASM.
      	window.addEventListener('keydown', function(e) {
      		if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      			e.stopImmediatePropagation();
      			e.preventDefault();
      			console.log('weboffice: Ctrl+S intercepted, shiftKey=' + e.shiftKey);
      			if (thrPort) thrPort.postMessage({ cmd: e.shiftKey ? 'triggerSaveAs' : 'triggerSave' });
      		}
      	}, { capture: true });


      	function saveFile(bytes) {
      		setStatus("Saving file...", false);
        	fetch(filePath, { method: 'PUT', headers: {}, body: bytes }).then(function(response) {
    			if (response.status === 200) {
                	setStatus("File saved", true);
				} else {
			    	console.log('error saving file:' + response.status);
			    	setStatus("Unable to save file...", false);
				}
    		});
      	}

      	function saveFileAs(bytes, saveFilename) {
      		setStatus("Saving file...", false);
        	fetch('/peergos-api/v0/save/' + (saveFilename || filename), { method: 'PUT', body: bytes }).then(function(response) {
    			if (response.status === 200 || response.status === 201) {
                	setStatus("File saved", true);
				} else {
			    	console.log('error saving file as:' + response.status);
			    	setStatus("Unable to save file...", false);
				}
    		});
      	}

      	// Core file-open logic: fetch from Peergos, write to WASM FS, return filename.
      	// Used by both the UNO-dispatch path and the custom FilePicker path.
      	const openExts = 'odt,ott,doc,docx,rtf,txt,html,htm,' +
      	                 'ods,ots,xls,xlsx,csv,' +
      	                 'odp,otp,ppt,pptx,' +
      	                 'odg,otg,svg';

      	async function fetchAndStageOpenFile() {
      		setStatus('Opening file picker...', false);
      		const response = await fetch(
      			'/peergos-api/v0/file-picker/?extension=' + openExts,
      			{ method: 'GET' }
      		);
      		if (response.status !== 200) { setStatus('', false); return null; }
      		const files = JSON.parse(await response.text());
      		if (!files || !files.length || !files[0]) { setStatus('', false); return null; }
      		const selectedPath = files[0];
      		const newFilename = selectedPath.substring(selectedPath.lastIndexOf('/') + 1);
      		setStatus('Loading ' + newFilename + '...', false);
      		const fileResponse = await fetch(selectedPath, { method: 'GET' });
      		if (fileResponse.status !== 200) { setStatus('Failed to load file', false); return null; }
      		const bytes = new Uint8Array(await fileResponse.arrayBuffer());
      		try { FS.mkdir('/tmp/office/'); } catch {}
      		FS.writeFile('/tmp/office/' + newFilename, bytes);
      		filePath = selectedPath;
      		filename = newFilename;
      		isPathWritable = true;
      		setStatus('', false);
      		return newFilename;
      	}

      	// Called when the UNO XDispatch intercepts File > Open (toolbar / keyboard).
      	async function pickOpenFile() {
      		try {
      			const newFilename = await fetchAndStageOpenFile();
      			if (!newFilename) return;
      			loadingInfo.style.display = '';
      			canvas.style.visibility = 'hidden';
      			btnSaveAs.style.display = 'none';
      			thrPort.postMessage({ cmd: 'openFile', filename: newFilename });
      		} catch(e) {
      			console.error('pickOpenFile failed:', e);
      			setStatus('', false);
      		}
      	}

      	// Called by the custom FilePicker registered in the UNO service manager.
      	// The worker is blocked on Atomics.wait(); we write the filename into the SAB
      	// and signal it. The worker then opens the file itself via openFileInFrame().
      	async function pickOpenFilePicker(sab) {
      		const signal = new Int32Array(sab, 0, 1);
      		const pathBuf = new Uint8Array(sab, 4);
      		try {
      			const newFilename = await fetchAndStageOpenFile();
      			if (!newFilename) {
      				Atomics.store(signal, 0, 2); // CANCEL
      				Atomics.notify(signal, 0);
      				return;
      			}
      			// Show loading UI — the worker will call openFileInFrame which posts ui_ready.
      			loadingInfo.style.display = '';
      			canvas.style.visibility = 'hidden';
      			btnSaveAs.style.display = 'none';
      			// Write the filename (not full URL) into the SAB; the worker prepends the path.
      			const encoded = new TextEncoder().encode(newFilename);
      			pathBuf.set(encoded.subarray(0, Math.min(encoded.length, 4095)));
      			pathBuf[Math.min(encoded.length, 4095)] = 0;
      			Atomics.store(signal, 0, 1); // OK
      			Atomics.notify(signal, 0);
      		} catch(e) {
      			console.error('pickOpenFilePicker failed:', e);
      			setStatus('', false);
      			Atomics.store(signal, 0, 2); // CANCEL
      			Atomics.notify(signal, 0);
      		}
      	}

      	async function pickImageFile() {
      		setStatus('Opening file picker...', false);
      		try {
      			const ext = 'jpg,jpeg,png,gif,webp,svg,avif,bmp';
      			const response = await fetch(
      				'/peergos-api/v0/file-picker/?extension=' + ext,
      				{ method: 'GET' }
      			);
      			if (response.status !== 200) { setStatus('', false); return; }
      			const files = JSON.parse(await response.text());
      			if (!files || !files.length || !files[0]) { setStatus('', false); return; }
      			const selectedPath = files[0];
      			const imgExt = (selectedPath.match(/\.([^.]+)$/) || ['', 'png'])[1].toLowerCase();
      			setStatus('Loading image...', false);
      			const imgResponse = await fetch(selectedPath, { method: 'GET' });
      			if (imgResponse.status !== 200) {
      				setStatus('Failed to load image', false); return;
      			}
      			const bytes = new Uint8Array(await imgResponse.arrayBuffer());
      			const tmpPath = '/tmp/insert_image.' + imgExt;
      			FS.writeFile(tmpPath, bytes);
      			setStatus('Inserting image...', false);
      			thrPort.postMessage({ cmd: 'insertGraphic', tmpPath });
      		} catch(e) {
      			console.error('pickImageFile failed:', e);
      			setStatus('', false);
      		}
      	}

      	function saveNewFile(bytes, saveFilename) {
      		const dir = filePath.substring(0, filePath.lastIndexOf('/') + 1);
      		const targetPath = dir + saveFilename;
      		setStatus("Saving " + saveFilename + "...", false);
        	fetch(targetPath, { method: 'PUT', body: bytes }).then(function(response) {
    			if (response.status === 200 || response.status === 201) {
                	setStatus(saveFilename + " saved", true);
				} else {
			    	console.log('error saving new file:' + response.status);
			    	setStatus("Unable to save " + saveFilename, false);
				}
    		});
      	}

      // Scroll only the canvas while the mouse cursor is above it.
      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
      }, {passive: false});

      window.onresize = function() {
        // Workaround to inform Qt5 about changed browser zoom.
        setTimeout(function() {
          try {
            if (lastDevicePixelRatio) {
              if (lastDevicePixelRatio != window.devicePixelRatio) {
                lastDevicePixelRatio = false;
                window.dispatchEvent(new Event('resize'));
              }
            } else {
              lastDevicePixelRatio = window.devicePixelRatio
              window.dispatchEvent(new Event('resize'));
            }
          } catch(e) { console.warn('resize proxy error:', e); }
        }, 100);
      };


      const soffice_js = document.createElement("script");
      soffice_js.src = soffice_base_url + "soffice.js";
      // "onload" runs after the loaded script has run.
      soffice_js.onload = function() {
        console.log('PLUS: Configuring Module');
        Module.uno_main.then(function(pThrPort) {
          thrPort = pThrPort;
          thrPort.onmessage = function(e) {
            switch (e.data.cmd) {
            case 'thr_running':
              loadingInfo.style.display = 'none';
              if (filePath) {
                setTimeout(() => loadFile(), 10);
              } else {
                try { FS.mkdir('/tmp/office/'); } catch {}
                setTimeout(() => thrPort.postMessage({ cmd: 'newDoc' }), 10);
              }
              break;
            case 'ui_ready':  // user uploaded a file
              // Trigger resize of the embedded window to match the canvas size.
              // May somewhen be obsoleted by:
              //   https://gerrit.libreoffice.org/c/core/+/174040
              try { window.dispatchEvent(new Event('resize')); } catch(e) { console.warn('resize proxy error:', e); }
              setTimeout(function() {  // display Office UI properly
                loadingInfo.style.display = 'none';
                canvas.style.visibility = null;
                setStatus('', false);
                btnSaveAs.style.display = '';
              }, 1000);
              break;
            case 'saved': {
              const saveFilename = e.data.filename || filename;
              const readPath = e.data.tmpFile ? '/tmp/' + e.data.tmpFile : '/tmp/office/' + saveFilename;
              let bytes;
              try { bytes = FS.readFile(readPath); } catch(err) {
                setStatus('Save failed: ' + err.message, false);
                break;
              }
              if (!bytes || bytes.length === 0) {
                setStatus('Save failed: document could not be written to disk', false);
                break;
              }
              if (e.data.isAs || !isPathWritable) {
                saveFileAs(bytes, saveFilename);
              } else {
                saveFile(bytes);
              }
              break;
            }
            case 'pickOpenFile':
              pickOpenFile();
              break;
            case 'pickOpenFilePicker':
              pickOpenFilePicker(e.data.sab);
              break;
            case 'debug':
              console.log('[main] debug from worker:', e.data.message);
              setStatus('[debug] ' + e.data.message, true);
              break;
            case 'pickImage':
              pickImageFile();
              break;
            case 'imageInserted':
              setStatus('Image inserted', true);
              break;

            case 'error':
              loadingInfo.style.display = 'none';
              setStatus('Error: ' + e.data.message, false);
              break;
            default:
              throw Error('Unknown message command: ' + e.data.cmd);
            }
          };
        });
      };
      // Intercept Qt WASM file dialogs. LO's File > Open bypasses the UNO dispatch chain
      // and goes directly to Qt's QFileDialog, which in WASM creates an <input type="file">
      // element and calls .click() on it. We override createElement to catch this and
      // redirect to our Peergos file picker instead of the browser's native picker.
      (function() {
        const _origCreate = document.createElement.bind(document);
        document.createElement = function(tag) {
          const el = _origCreate.apply(document, arguments);
          if (typeof tag === 'string' && tag.toLowerCase() === 'input') {
            const _origClick = el.click.bind(el);
            el.click = function() {
              if (el.type === 'file' && thrPort) {
                pickOpenFile();
                return;
              }
              _origClick();
            };
          }
          return el;
        };
      })();

      // Check if WebGL is available on OffscreenCanvas before loading the heavy WASM.
      // LibreOffice WASM renders via Qt into an OffscreenCanvas WebGL context in a Worker.
      // If WebGL is unavailable (no GPU, hardware acceleration disabled), it fails silently.
      function checkOffscreenWebGL() {
        if (typeof OffscreenCanvas === 'undefined') return false;
        try {
          var oc = new OffscreenCanvas(1, 1);
          return !!(oc.getContext('webgl') || oc.getContext('webgl2'));
        } catch(e) { return false; }
      }

      // Cache the compiled WebAssembly.Module in IndexedDB so subsequent loads skip
      // the expensive JS brotli decompression (~5-15s) and WASM JIT compilation (~5-15s).
      // The cached module is validated against the ETag/Last-Modified from the server.
      (function() {
        const IDB_NAME = 'weboffice-wasm-cache';
        const IDB_VERSION = 1;
        const IDB_STORE = 'modules';
        const WASM_KEY = 'soffice.wasm';

        function idbOpen() {
          return new Promise(function(res, rej) {
            var r = indexedDB.open(IDB_NAME, IDB_VERSION);
            r.onupgradeneeded = function(e) { e.target.result.createObjectStore(IDB_STORE); };
            r.onsuccess = function(e) { res(e.target.result); };
            r.onerror = function(e) { rej(e.target.error); };
          });
        }
        function idbGet(db, key) {
          return new Promise(function(res, rej) {
            var r = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
            r.onsuccess = function(e) { res(e.target.result); };
            r.onerror = function(e) { rej(e.target.error); };
          });
        }
        function idbPut(db, key, val) {
          return new Promise(function(res, rej) {
            var r = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(val, key);
            r.onsuccess = function() { res(); };
            r.onerror = function(e) { rej(e.target.error); };
          });
        }

        Module['instantiateWasm'] = function(imports, receiveInstance) {
          var wasmUrl = soffice_base_url + 'soffice.wasm';
          (async function() {
            var db = null;
            try { db = await idbOpen(); } catch(e) {
              console.warn('weboffice: IDB unavailable, WASM module will not be cached:', e);
            }

            // Fetch soffice.wasm. The preload hint above means the browser likely already
            // started this request; if HTTP cache has it, no network transfer occurs.
            var response = await fetch(wasmUrl, { credentials: 'same-origin' });
            var cacheKey = response.headers.get('ETag') ||
                           response.headers.get('Last-Modified') || '';

            // Try the IDB cache first.
            var wasmModule = null;
            if (db) {
              try {
                var cached = await idbGet(db, WASM_KEY);
                // Accept the cached module if cacheKey matches, or if we have no key to validate with.
                if (cached && cached.module && (!cacheKey || cached.key === cacheKey)) {
                  wasmModule = cached.module;
                  console.log('weboffice: Loaded compiled WASM module from IndexedDB');
                  setStatus('Loading Office engine from cache...', false);
                }
              } catch(e) {
                console.warn('weboffice: Failed to read WASM module from IDB:', e);
              }
            }

            if (!wasmModule) {
              setStatus('Loading Office...', false);
              var compressed = new Uint8Array(await response.arrayBuffer());
              console.log('weboffice: Decompressing WASM...');
              var decompressed = dw(compressed);
              console.log('weboffice: Compiling WASM...');
              wasmModule = await WebAssembly.compile(decompressed);

              // Store compiled module in IDB in the background — don't block startup.
              if (db) {
                idbPut(db, WASM_KEY, { key: cacheKey, module: wasmModule })
                  .then(function() { console.log('weboffice: Cached compiled WASM module in IndexedDB'); })
                  .catch(function(e) { console.warn('weboffice: Failed to cache WASM module:', e); });
              }
            }

            var instance = await WebAssembly.instantiate(wasmModule, imports);
            receiveInstance(instance, wasmModule);
          })().catch(function(e) {
            console.error('weboffice: instantiateWasm failed:', e);
          });
          return {}; // Non-empty return signals to Emscripten that we're handling WASM loading.
        };
      })();

      if (!checkOffscreenWebGL()) {
        loadingInfo.style.display = 'none';
        setStatus('WebGL is not available. Web Office requires hardware-accelerated WebGL. ' +
          'Please enable hardware acceleration in your browser settings.', false);
      } else {
        console.log('Loading WASM binaries for ZetaJS from: ' + soffice_base_url);
        // Hint: The global objects "canvas" and "Module" must exist before the next line.
        document.body.appendChild(soffice_js);
      }
    </script>
  </body>
</html>
