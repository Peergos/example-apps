<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Peer-Go</title>
    <script src="jquery-1.6.1.min.js"></script>
    <script src="ish.go.js"></script>
    <script src="ish.go.logic.js"></script>
    <script src="ish.go.view.h5.js"></script>
    <link rel="stylesheet" href="style-h5.css" />
</head>
<body>

    <!-- Game list / lobby -->
    <div id="mpSetup">
        <h2>Peer-Go</h2>
        <button id="mpNewGameBtn" onclick="App.newGame()">New Game</button>
        <div id="gameListItems" style="margin-top:14px;"></div>
    </div>

    <!-- Game board (hidden until a game is opened) -->
    <div id="gameSection" style="display:none;">

        <div id="mpNav">
            <span class="link" onclick="App.backToList()">← Games</span>
        </div>

        <div id="mpStatus"></div>

        <div id="board"></div>

        <div id="info">
            <div id="turn"></div>
            <br>
            <div id="score"></div>
        </div>

        <div class="clear"></div>

        <div id="mpMoveNav" style="display:none; margin-top:8px;">
            <button id="btnBack" onclick="App.stepBack()">&#9664;</button>
            <span id="moveCount"></span>
            <button id="btnForward" onclick="App.stepForward()">&#9654;</button>
        </div>

        <div id="mpActions" style="display:none; margin-top:8px;">
            <button onclick="App.pass()">Pass</button>
            <button onclick="App.resign()">Resign</button>
        </div>

        <div id="mpResult" style="display:none; margin-top:8px; font-weight:bold;"></div>

    </div>

    <script src="multiplayer.js"></script>
</body>
</html>
